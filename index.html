<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBM Inventario</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f6fa;color:#1a1a2e}
.screen{display:none}.screen.active{display:block}

/* HOME */
.home-wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.home-title{font-size:22px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
.home-sub{font-size:13px;color:#6b7280;margin-bottom:20px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.proj-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.proj-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:#d1d5db}
.proj-dot{width:12px;height:12px;border-radius:50%;margin-bottom:10px}
.proj-name{font-weight:600;font-size:14px;color:#1a1a2e}
.proj-count{font-size:12px;color:#9ca3af;margin-top:3px}

/* PROJECT HEADER */
.proj-header{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 16px;position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px}
.back-btn{background:none;border:none;cursor:pointer;color:#6b7280;font-size:20px;line-height:1;padding:2px 4px}
.back-btn:hover{color:#374151}
.proj-header-name{font-weight:600;font-size:15px}
.header-month{margin-left:auto;font-size:12px;color:#9ca3af}
.header-actions{display:flex;gap:8px;margin-left:8px}

/* TABS */
.tabs-wrap{background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:49px;z-index:29;overflow-x:auto}
.tabs{display:flex;min-width:max-content}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:400;border:none;background:none;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.tab-btn.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:500}

/* FEEDBACK */
.feedback{border-radius:8px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}
.feedback.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.feedback.warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a}

/* CONTENT */
.content{padding:14px 16px;max-width:900px;margin:0 auto}

/* CARDS */
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:12px}
.card-pad{padding:14px 16px}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{display:block;font-size:11px;font-weight:600;color:#6b7280;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;color:#1a1a2e;transition:border-color .15s}
.field input:focus,.field select:focus{outline:none;border-color:#2563eb}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:#6b7280;background:#f9fafb;text-transform:uppercase;letter-spacing:.04em}
th.tc{text-align:center}
td{padding:8px 12px;border-top:1px solid #f3f4f6;vertical-align:middle}
td.tc{text-align:center}
tr:hover td{background:#fafafa}
.pname{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;font-size:13px}
.psub{font-size:11px;color:#9ca3af}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600}
.badge-ok{background:#f0fdf4;color:#166534}
.badge-low{background:#fffbeb;color:#92400e}
.badge-crit{background:#fef2f2;color:#991b1b}
.badge-in{background:#f0fdf4;color:#166534}
.badge-out{background:#fef2f2;color:#991b1b}

/* INPUTS */
.ni{width:64px;text-align:center;border:1px solid #d1d5db;border-radius:6px;padding:5px 6px;font-size:13px;background:#fff;color:#1a1a2e}
.ni:focus{outline:none}
.ni-e{border-color:#86efac}.ni-e:focus{border-color:#22c55e}
.ni-s{border-color:#fca5a5}.ni-s:focus{border-color:#ef4444}

/* BUTTONS */
.btn{border:1px solid #d1d5db;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;background:#fff;color:#374151;transition:background .15s,border-color .15s;font-weight:500}
.btn:hover{background:#f9fafb}
.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
.btn-primary:hover{background:#1d4ed8}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:#dc2626;border-color:#fca5a5}
.btn-danger:hover{background:#fef2f2}
.btn-full{width:100%;padding:11px}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{flex:1}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-hdr h3{font-size:14px;font-weight:600;color:#1a1a2e}

/* ADJ PANEL */
.adj-panel{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:12px}
.adj-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.adj-row span{flex:1;font-size:12px;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* INFO BOX */
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:13px 16px;margin-bottom:12px;font-size:13px;color:#1e40af}

/* FORM FIELDS */
.input-full{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;color:#1a1a2e}
.input-full:focus{outline:none;border-color:#2563eb}

/* NEW STOCK COLOR */
.ns-pos{font-weight:600;color:#2563eb}
.ns-neg{font-weight:600;color:#dc2626}

/* DETAILS */
details summary{cursor:pointer;font-size:12px;color:#6b7280;padding:6px 0;user-select:none}
.ok-list{background:#f0fdf4;border-radius:8px;padding:10px 12px;margin-top:6px}
.ok-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.ok-row span:first-child{color:#374151;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.ok-row span:last-child{color:#166534;font-weight:600;flex-shrink:0}

/* LOADING */
.loading{text-align:center;padding:40px;color:#9ca3af;font-size:13px}
.spinner{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PRINT */
@media print{
  .no-print{display:none!important}
  .proj-header,.tabs-wrap,.header-actions,.back-btn,.btn-row,.feedback{display:none!important}
  body{background:#fff;font-size:12px}
  .card{border:1px solid #ccc;border-radius:0;box-shadow:none}
  table{font-size:11px}
  th{background:#f0f0f0!important;print-color-adjust:exact}
  .print-title{display:block!important;font-size:16px;font-weight:700;margin-bottom:12px;color:#000}
}
.print-title{display:none}

/* MOBILE */
@media(max-width:480px){
  .form-grid{grid-template-columns:1fr}
  .header-actions{display:none}
  .proj-grid{grid-template-columns:repeat(2,1fr)}
  .pname{max-width:130px}
  .ni{width:52px}
}
</style>
</head>
<body>

<!-- HOME -->
<div id="s-home" class="screen active">
  <div class="home-wrap">
    <p class="home-title">Control de Inventarios</p>
    <p class="home-sub">SBM Corp — Seleccioná el proyecto</p>
    <div id="loading-home" class="loading"><div class="spinner"></div>Cargando proyectos...</div>
    <div class="proj-grid" id="proj-grid" style="display:none"></div>
  </div>
</div>

<!-- PROJECT -->
<div id="s-proj" class="screen">
  <div class="proj-header no-print">
    <button class="back-btn" id="back-btn" title="Volver">&#8592;</button>
    <div class="proj-dot" id="hdr-dot" style="width:10px;height:10px;border-radius:50%"></div>
    <span id="hdr-title" style="font-weight:600;font-size:15px"></span>
    <span id="hdr-month" class="header-month"></span>
    <div class="header-actions no-print">
      <button class="btn btn-sm" onclick="exportExcel()" title="Exportar Excel">📊 Excel</button>
      <button class="btn btn-sm" onclick="printView()" title="Imprimir">🖨️ Imprimir</button>
    </div>
  </div>

  <div class="tabs-wrap no-print">
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-t="mov">Movimientos</button>
      <button class="tab-btn" data-t="inv">Inventario</button>
      <button class="tab-btn" data-t="ped" id="ped-tab">Pedido</button>
      <button class="tab-btn" data-t="his">Historial</button>
      <button class="tab-btn" data-t="cfg">Config</button>
    </div>
  </div>

  <div class="content">
    <div id="fbk" class="feedback"></div>
    <div id="t-mov" class="tab-pane"></div>
    <div id="t-inv" class="tab-pane" style="display:none"></div>
    <div id="t-ped" class="tab-pane" style="display:none"></div>
    <div id="t-his" class="tab-pane" style="display:none"></div>
    <div id="t-cfg" class="tab-pane" style="display:none"></div>
  </div>
</div>

<script>
// ─── CONFIG SUPABASE ───────────────────────────────────────────────
const SUPA_URL = 'https://exuhbfsasoboxmksomar.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4dWhiZnNhc29ib3hta3NvbWFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4Mjk4NjYsImV4cCI6MjA5NTQwNTg2Nn0.Ao8l3NUkHxiDwWmK-GMpsBHgoQalFemb4Lf08yIyz4I';

async function sb(path, opts={}) {
  const {prefer, headers: extraHeaders, ...fetchOpts} = opts;
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
    ...fetchOpts,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': prefer || (extraHeaders && extraHeaders['Prefer']) || 'return=representation',
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

const sGet  = (t, q='') => sb(t + (q ? '?' + q : ''), {method:'GET'});
const sPost = (t, data) => sb(t, {method:'POST', body:JSON.stringify(data)});
const sPut  = (t, q, data) => sb(t + '?' + q, {method:'PUT', body:JSON.stringify(data), prefer:'resolution=merge-duplicates'});
const sDel  = (t, q) => sb(t + '?' + q, {method:'DELETE'});

// ─── STATE ─────────────────────────────────────────────────────────
const now = new Date();
const TODAY = now.toISOString().split('T')[0];
const CY = now.getFullYear(), CM = now.getMonth(), CD = now.getDate();
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let projects = [], products = {}, stock = {};
let AP = null, AT = 'mov';
let MI = {}, MD = TODAY, MR = '';
let SA = false, AI = {}, SAP = false, NP = {name:'',unit:'PQT',em:''};

// ─── INIT ──────────────────────────────────────────────────────────
async function init() {
  try {
    projects = await sGet('projects', 'order=name');
    document.getElementById('loading-home').style.display = 'none';
    document.getElementById('proj-grid').style.display = 'grid';
    renderHome();
  } catch(e) {
    document.getElementById('loading-home').innerHTML = '⚠️ Error al conectar con Supabase. Recargá la página.';
  }
}

function renderHome() {
  document.getElementById('proj-grid').innerHTML = projects.map(p => `
    <div class="proj-card" onclick="openProject('${p.id}')">
      <div class="proj-dot" style="background:${p.color}"></div>
      <div class="proj-name">${p.name}</div>
      <div class="proj-count">Toca para abrir</div>
    </div>`).join('');
}

// ─── OPEN PROJECT ──────────────────────────────────────────────────
async function openProject(pid) {
  AP = pid; AT = 'mov'; MI = {}; MD = TODAY; MR = '';
  SA = false; AI = {}; SAP = false;
  const p = projects.find(x => x.id === pid);

  document.getElementById('s-home').classList.remove('active');
  document.getElementById('s-proj').classList.add('active');
  document.getElementById('hdr-dot').style.background = p.color;
  document.getElementById('hdr-title').textContent = p.name;
  document.getElementById('hdr-month').textContent = MONTHS[CM] + ' ' + CY;
  document.getElementById('ped-tab').textContent = 'Pedido' + (CD >= 18 ? ' 🔔' : '');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.t === 'mov'));
  hideFbk();

  // Cargar productos y stock
  showTabLoading('mov');
  try {
    const prods = await sGet('products', 'project_id=eq.' + pid + '&order=name');
    products[pid] = prods;
    const stk = await sGet('stock', 'project_id=eq.' + pid);
    stock[pid] = {};
    stk.forEach(s => stock[pid][s.product_id] = parseFloat(s.qty));
  } catch(e) { showFbk('⚠️ Error cargando datos', 'warn'); }

  showTab('mov');
}

document.getElementById('back-btn').onclick = () => {
  document.getElementById('s-home').classList.add('active');
  document.getElementById('s-proj').classList.remove('active');
  AP = null;
};

document.getElementById('tabs').onclick = e => {
  const b = e.target.closest('.tab-btn');
  if (!b) return;
  const t = b.dataset.t;
  document.querySelectorAll('.tab-btn').forEach(x => x.classList.toggle('active', x.dataset.t === t));
  AT = t; showTab(t);
};

function showTab(t) {
  document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
  document.getElementById('t-' + t).style.display = 'block';
  hideFbk();
  if (t === 'mov') renderMov();
  else if (t === 'inv') renderInv();
  else if (t === 'ped') renderPed();
  else if (t === 'his') renderHis();
  else if (t === 'cfg') renderCfg();
}

function showTabLoading(t) {
  document.getElementById('t-' + t).innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
}

// ─── MOVIMIENTOS ───────────────────────────────────────────────────
function getStock(productId) { return stock[AP]?.[productId] ?? 0; }
function getProds() { return products[AP] || []; }

function renderMov() {
  const el = document.getElementById('t-mov');
  if (!getProds().length) {
    el.innerHTML = `<div class="loading">No hay productos configurados.<br><br>
      <button class="btn btn-primary" onclick="goTab('cfg')">Ir a Config →</button></div>`;
    return;
  }
  const rows = getProds().map(p => {
    const cur = getStock(p.id);
    return `<tr>
      <td><span class="pname" title="${p.name}">${p.name}</span><span class="psub">${p.unit}</span></td>
      <td class="tc"><b style="color:${cur===0?'#dc2626':'#1a1a2e'}">${cur}</b></td>
      <td class="tc"><input class="ni ni-e" type="number" min="0" step="1" placeholder="0" oninput="setInput('${p.id}','e',this.value)" id="ei-${p.id}"></td>
      <td class="tc"><input class="ni ni-s" type="number" min="0" step="1" placeholder="0" oninput="setInput('${p.id}','s',this.value)" id="si-${p.id}"></td>
      <td class="tc" id="ns-${p.id}"><span style="color:#9ca3af">—</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="card card-pad" style="margin-bottom:12px">
      <div class="form-grid">
        <div class="field"><label>Fecha</label>
          <input type="date" value="${MD}" onchange="MD=this.value" class="input-full"></div>
        <div class="field"><label>Responsable</label>
          <input type="text" placeholder="Nombre" value="${MR}" oninput="MR=this.value" class="input-full"></div>
      </div>
    </div>
    <div class="card" style="overflow-x:auto;margin-bottom:12px">
      <table>
        <thead><tr>
          <th>Producto</th>
          <th class="tc">Stock act.</th>
          <th class="tc" style="color:#16a34a">Entrada</th>
          <th class="tc" style="color:#dc2626">Salida</th>
          <th class="tc">Nuevo saldo</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <button class="btn btn-primary btn-full no-print" onclick="registerMovements()">✓ Registrar Movimientos</button>`;
}

function setInput(id, f, v) {
  if (!MI[id]) MI[id] = {e:'', s:''};
  MI[id][f] = v;
  const cur = getStock(id);
  const ev = parseFloat(MI[id].e)||0, sv = parseFloat(MI[id].s)||0, nw = cur+ev-sv;
  const el = document.getElementById('ns-' + id);
  if (el) el.innerHTML = (ev>0||sv>0)
    ? `<span class="${nw<0?'ns-neg':'ns-pos'}">${nw}</span>`
    : `<span style="color:#9ca3af">—</span>`;
}

async function registerMovements() {
  if (!MD || !MR.trim()) { showFbk('⚠️ Ingresá la fecha y el responsable', 'warn'); return; }
  const entries = [], stockUpdates = [];
  const ns = {...(stock[AP]||{})};

  for (const p of getProds()) {
    const inp = MI[p.id]||{};
    const e = parseFloat(inp.e)||0, s = parseFloat(inp.s)||0;
    const ts = Date.now();
    if (e > 0) {
      entries.push({id:`${ts}-${p.id}-e`, project_id:AP, product_id:p.id, type:'entrada', qty:e, date:MD, responsable:MR.trim()});
      ns[p.id] = (ns[p.id]??0) + e;
    }
    if (s > 0) {
      entries.push({id:`${ts}-${p.id}-s`, project_id:AP, product_id:p.id, type:'salida', qty:s, date:MD, responsable:MR.trim()});
      ns[p.id] = (ns[p.id]??0) - s;
    }
  }

  if (!entries.length) { showFbk('⚠️ No hay movimientos para registrar', 'warn'); return; }

  // Build stock upsert array
  Object.entries(ns).forEach(([pid, qty]) => {
    stockUpdates.push({project_id: AP, product_id: pid, qty});
  });

  try {
    await sPost('movements', entries);
    await sb('stock', {
      method: 'POST',
      body: JSON.stringify(stockUpdates),
      prefer: 'resolution=merge-duplicates'
    });
    stock[AP] = ns;
    MI = {};
    renderMov();
    showFbk('✅ ' + entries.length + ' movimiento(s) registrados', 'ok');
  } catch(e) {
    showFbk('⚠️ Error al guardar: ' + e.message, 'warn');
  }
}

// ─── INVENTARIO ────────────────────────────────────────────────────
function renderInv() {
  const el = document.getElementById('t-inv');
  const adjH = SA ? `
    <div class="adj-panel">
      <p style="font-size:13px;font-weight:600;margin-bottom:10px">📦 Ingresá el stock físico actual:</p>
      <div style="max-height:220px;overflow-y:auto">
        ${getProds().map(p => `
          <div class="adj-row">
            <span title="${p.name}">${p.name}</span>
            <input class="ni" type="number" min="0" value="${AI[p.id]??getStock(p.id)}"
              oninput="AI['${p.id}']=this.value" style="width:70px">
          </div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveAdj()">Guardar</button>
        <button class="btn" onclick="SA=false;renderInv()">Cancelar</button>
      </div>
    </div>` : '';

  const rows = getProds().map(p => {
    const s = getStock(p.id), r = p.expected_monthly > 0 ? s/p.expected_monthly : 1;
    const st = r <= 0.2 ? {l:'Crítico',c:'badge-crit'} : r <= 0.5 ? {l:'Bajo',c:'badge-low'} : {l:'OK',c:'badge-ok'};
    return `<tr>
      <td><span class="pname" title="${p.name}">${p.name}</span><span class="psub">${p.unit}</span></td>
      <td class="tc" style="font-weight:600">${s}</td>
      <td class="tc" style="color:#6b7280">${p.expected_monthly}</td>
      <td class="tc"><span class="badge ${st.c}">${st.l}</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="print-title" id="print-inv-title"></div>
    <div class="sec-hdr no-print">
      <h3>Stock Actual</h3>
      <button class="btn btn-sm" onclick="SA=true;AI={};renderInv()">✏️ Ajustar stock</button>
    </div>
    ${adjH}
    <div class="card" style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>Producto</th><th class="tc">Stock</th><th class="tc">Consumo/mes</th><th class="tc">Estado</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function saveAdj() {
  const ns = {...(stock[AP]||{})};
  const updates = [];
  for (const [k, v] of Object.entries(AI)) {
    const n = parseFloat(v);
    if (!isNaN(n) && n >= 0) { ns[k] = n; updates.push({project_id:AP, product_id:k, qty:n}); }
  }
  if (!updates.length) return;
  try {
    await sb('stock', {method:'POST', body:JSON.stringify(updates), prefer:'resolution=merge-duplicates'});
    stock[AP] = ns;
    SA = false; AI = {};
    renderInv();
    showFbk('✅ Stock guardado correctamente', 'ok');
  } catch(e) { showFbk('⚠️ Error: ' + e.message, 'warn'); }
}

// ─── PEDIDO SUGERIDO ───────────────────────────────────────────────
async function renderPed() {
  const el = document.getElementById('t-ped');
  showTabLoading('ped');
  try {
    // Movimientos del mes actual
    const firstDay = `${CY}-${String(CM+1).padStart(2,'0')}-01`;
    const movs = await sGet('movements',
      `project_id=eq.${AP}&type=eq.salida&date=gte.${firstDay}&order=date`);

    const stk = stock[AP] || {};
    const order = getProds().map(p => {
      const sal = movs.filter(m => m.product_id === p.id).reduce((a,m) => a + parseFloat(m.qty), 0);
      const proj = CD >= 7 ? Math.ceil(sal * 30 / CD) : p.expected_monthly;
      const tgt = Math.max(proj, p.expected_monthly || 0);
      const cur = stk[p.id] ?? 0;
      return {p, cur, sal, sug: Math.max(0, Math.ceil(tgt * 1.2) - cur)};
    });

    const need = order.filter(o => o.sug > 0);
    const ok   = order.filter(o => o.sug === 0);
    const nm = MONTHS[(CM+1) % 12];

    el.innerHTML = `
      <div class="print-title" id="print-ped-title"></div>
      <div class="info-box">
        <b>📦 Pedido sugerido — ${nm} ${CY}</b><br>
        <span style="font-size:12px;opacity:.85">Consumo de ${MONTHS[CM]} (día ${CD}/30) · Stock de seguridad 20%</span>
      </div>
      ${!need.length
        ? `<div class="loading">✅ Todos los productos tienen stock suficiente</div>`
        : `<div class="card" style="overflow-x:auto;margin-bottom:12px">
            <table>
              <thead><tr>
                <th>Producto</th>
                <th class="tc">Stock act.</th>
                <th class="tc">Consumido mes</th>
                <th class="tc" style="color:#2563eb">A pedir</th>
              </tr></thead>
              <tbody>
                ${need.map(({p,cur,sal,sug}) => `<tr>
                  <td><span class="pname" title="${p.name}">${p.name}</span><span class="psub">${p.unit}</span></td>
                  <td class="tc" style="color:#6b7280">${cur}</td>
                  <td class="tc" style="color:#6b7280">${sal}</td>
                  <td class="tc"><b style="color:#2563eb;font-size:15px">${sug}</b></td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>`}
      ${ok.length ? `
        <details>
          <summary>Productos con stock suficiente (${ok.length})</summary>
          <div class="ok-list">
            ${ok.map(({p,cur}) => `<div class="ok-row">
              <span title="${p.name}">${p.name}</span>
              <span>${cur} en stock</span>
            </div>`).join('')}
          </div>
        </details>` : ''}`;
  } catch(e) {
    el.innerHTML = `<div class="loading">⚠️ Error cargando datos: ${e.message}</div>`;
  }
}

// ─── HISTORIAL ─────────────────────────────────────────────────────
async function renderHis() {
  const el = document.getElementById('t-his');
  showTabLoading('his');
  try {
    const movs = await sGet('movements',
      `project_id=eq.${AP}&order=created_at.desc&limit=80`);
    const prods = products[AP] || [];
    if (!movs.length) {
      el.innerHTML = '<div class="loading">No hay movimientos registrados</div>'; return;
    }
    el.innerHTML = `
      <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Últimos movimientos</h3>
      <div class="card" style="overflow-x:auto">
        <table>
          <thead><tr><th>Tipo</th><th>Producto</th><th>Fecha</th><th>Responsable</th></tr></thead>
          <tbody>
            ${movs.map(m => {
              const p = prods.find(x => x.id === m.product_id);
              return `<tr>
                <td><span class="badge ${m.type==='entrada'?'badge-in':'badge-out'}">${m.type==='entrada'?'+':'-'}${m.qty}</span></td>
                <td><span class="pname" title="${p?.name||m.product_id}">${p?.name||m.product_id}</span></td>
                <td style="color:#6b7280;white-space:nowrap">${m.date}</td>
                <td style="color:#6b7280">${m.responsable||''}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="loading">⚠️ Error: ${e.message}</div>`;
  }
}

// ─── CONFIG ────────────────────────────────────────────────────────
function renderCfg() {
  const el = document.getElementById('t-cfg');
  const prods = getProds();
  const addForm = SAP ? `
    <div class="adj-panel" style="margin-bottom:12px">
      <p style="font-size:13px;font-weight:600;margin-bottom:10px">Nuevo Producto</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <input type="text" class="input-full" placeholder="Nombre del producto" value="${NP.name}" oninput="NP.name=this.value">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <input type="text" class="input-full" placeholder="Unidad (PQT, und...)" value="${NP.unit}" oninput="NP.unit=this.value">
          <input type="number" class="input-full" placeholder="Consumo mensual" value="${NP.em}" oninput="NP.em=this.value">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="addProduct()">Guardar</button>
        <button class="btn" onclick="SAP=false;renderCfg()">Cancelar</button>
      </div>
    </div>` : '';

  el.innerHTML = `
    <div class="sec-hdr">
      <h3>Productos configurados</h3>
      <button class="btn btn-primary btn-sm" onclick="SAP=true;NP={name:'',unit:'PQT',em:''};renderCfg()">+ Agregar</button>
    </div>
    ${addForm}
    ${!prods.length
      ? '<div class="loading">No hay productos — agregá el primero</div>'
      : `<div class="card" style="overflow-x:auto">
          <table>
            <thead><tr><th>Producto</th><th class="tc">Unidad</th><th class="tc">Consumo/mes</th><th class="tc"></th></tr></thead>
            <tbody>
              ${prods.map(p => `<tr>
                <td><span class="pname" title="${p.name}">${p.name}</span></td>
                <td class="tc" style="color:#6b7280">${p.unit}</td>
                <td class="tc" style="color:#6b7280">${p.expected_monthly}</td>
                <td class="tc"><button class="btn btn-sm btn-danger" onclick="deleteProduct('${p.id}')">🗑</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`}`;
}

async function addProduct() {
  if (!NP.name.trim() || !NP.em) return;
  const prod = {
    id: AP + '-' + Date.now(),
    project_id: AP,
    name: NP.name.trim(),
    unit: NP.unit || 'PQT',
    expected_monthly: parseFloat(NP.em) || 0
  };
  try {
    await sPost('products', prod);
    if (!products[AP]) products[AP] = [];
    products[AP].push(prod);
    SAP = false; NP = {name:'',unit:'PQT',em:''};
    showFbk('✅ Producto agregado', 'ok');
    renderCfg();
  } catch(e) { showFbk('⚠️ Error: ' + e.message, 'warn'); }
}

async function deleteProduct(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  try {
    await sDel('products', 'id=eq.' + id);
    products[AP] = products[AP].filter(p => p.id !== id);
    renderCfg();
  } catch(e) { showFbk('⚠️ Error: ' + e.message, 'warn'); }
}

// ─── EXPORTAR EXCEL ────────────────────────────────────────────────
async function exportExcel() {
  const proj = projects.find(p => p.id === AP);
  const wb = XLSX.utils.book_new();
  const stk = stock[AP] || {};
  const prods = products[AP] || [];

  // Hoja 1: Stock actual
  const invData = [['Producto','Unidad','Stock Actual','Consumo Mensual Esperado','Estado']];
  prods.forEach(p => {
    const s = stk[p.id] ?? 0;
    const r = p.expected_monthly > 0 ? s/p.expected_monthly : 1;
    const st = r <= 0.2 ? 'Crítico' : r <= 0.5 ? 'Bajo' : 'OK';
    invData.push([p.name, p.unit, s, p.expected_monthly, st]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(invData), 'Stock Actual');

  // Hoja 2: Movimientos del mes
  try {
    const firstDay = `${CY}-${String(CM+1).padStart(2,'0')}-01`;
    const movs = await sGet('movements', `project_id=eq.${AP}&date=gte.${firstDay}&order=date`);
    const movData = [['Fecha','Tipo','Producto','Cantidad','Responsable']];
    movs.forEach(m => {
      const p = prods.find(x => x.id === m.product_id);
      movData.push([m.date, m.type, p?.name||m.product_id, m.qty, m.responsable||'']);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(movData), 'Movimientos ' + MONTHS[CM]);
  } catch(e) {}

  // Hoja 3: Pedido sugerido
  try {
    const firstDay = `${CY}-${String(CM+1).padStart(2,'0')}-01`;
    const movs = await sGet('movements', `project_id=eq.${AP}&type=eq.salida&date=gte.${firstDay}`);
    const pedData = [['Producto','Unidad','Stock Actual','Consumido en el Mes','Pedido Sugerido']];
    prods.forEach(p => {
      const sal = movs.filter(m => m.product_id === p.id).reduce((a,m) => a+parseFloat(m.qty), 0);
      const proj = CD >= 7 ? Math.ceil(sal*30/CD) : p.expected_monthly;
      const tgt = Math.max(proj, p.expected_monthly||0);
      const cur = stk[p.id] ?? 0;
      const sug = Math.max(0, Math.ceil(tgt*1.2) - cur);
      if (sug > 0) pedData.push([p.name, p.unit, cur, sal, sug]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(pedData), 'Pedido ' + MONTHS[(CM+1)%12]);
  } catch(e) {}

  XLSX.writeFile(wb, `Inventario_${proj.name}_${MONTHS[CM]}_${CY}.xlsx`);
}

// ─── IMPRIMIR ──────────────────────────────────────────────────────
function printView() {
  const proj = projects.find(p => p.id === AP);
  const title = `${proj.name} — ${AT === 'ped' ? 'Pedido Sugerido' : 'Inventario'} — ${MONTHS[CM]} ${CY}`;
  const el = document.getElementById(AT === 'ped' ? 'print-ped-title' : 'print-inv-title');
  if (el) el.textContent = title;

  // Mostrar tab de inventario si no está visible
  if (AT !== 'inv' && AT !== 'ped') {
    goTab('inv');
    setTimeout(() => { window.print(); }, 300);
  } else {
    window.print();
  }
}

// ─── UTILS ─────────────────────────────────────────────────────────
function goTab(t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  AT = t; showTab(t);
}

function showFbk(msg, type) {
  const el = document.getElementById('fbk');
  el.textContent = msg; el.className = 'feedback ' + type; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function hideFbk() {
  const el = document.getElementById('fbk');
  if (el) el.style.display = 'none';
}

init();
</script>
