<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#111827;color:#f1f5f9}.screen{display:none}.screen.active{display:block}.home-wrap{max-width:740px;margin:0 auto;padding:22px 16px}.home-title{font-size:22px;font-weight:700;margin-bottom:4px}.home-sub{font-size:13px;color:#94a3b8;margin-bottom:16px}.proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}.proj-card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px;cursor:pointer}.proj-card:hover{border-color:#60a5fa;box-shadow:0 4px 14px rgba(0,0,0,.35)}.proj-dot{width:12px;height:12px;border-radius:50%;margin-bottom:10px}.proj-name{font-weight:650;font-size:14px}.proj-count{font-size:12px;color:#94a3b8;margin-top:4px}.login-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:18px;margin-top:18px}.proj-header{background:#1e2537;border-bottom:1px solid #334155;padding:12px 16px;position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px}.back-btn{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:20px;padding:2px 4px}.back-btn:hover{color:#e2e8f0}.header-month{margin-left:auto;font-size:12px;color:#94a3b8}.header-actions{display:flex;gap:8px;margin-left:8px;flex-wrap:wrap}.tabs-wrap{background:#1e2537;border-bottom:1px solid #334155;position:sticky;top:49px;z-index:29;overflow-x:auto}.tabs{display:flex;min-width:max-content}.tab-btn{padding:10px 16px;font-size:13px;border:none;background:none;cursor:pointer;color:#cbd5e1;border-bottom:2px solid transparent;white-space:nowrap}.tab-btn.active{color:#60a5fa;border-bottom-color:#60a5fa;font-weight:600}.feedback{border-radius:8px;padding:9px 14px;font-size:13px;margin-bottom:12px;display:none}.feedback.ok{background:#052e16;color:#86efac;border:1px solid #166534}.feedback.warn{background:#422006;color:#fcd34d;border:1px solid #d97706}.content{padding:14px 16px;max-width:980px;margin:0 auto}.card{background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden;margin-bottom:12px}.card-pad{padding:14px 16px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field label{display:block;font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}.field input,.field select,.field textarea,.input-full{width:100%;border:1px solid #334155;border-radius:8px;padding:8px 10px;font-size:13px;background:#0f172a;color:#f1f5f9}.field textarea,.textarea{min-height:100px;resize:vertical}table{width:100%;border-collapse:collapse;font-size:13px}th{padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;background:#0f172a;text-transform:uppercase;letter-spacing:.04em}th.tc,td.tc{text-align:center}td{padding:8px 12px;border-top:1px solid #334155;vertical-align:middle}tr:hover td{background:#0f172a}.pname{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;color:#f8fafc}.psub{font-size:11px;color:#94a3b8}.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}.badge-ok{background:#052e16;color:#86efac}.badge-low{background:#422006;color:#fcd34d}.badge-crit{background:#450a0a;color:#fecaca}.badge-in{background:#052e16;color:#86efac}.badge-out{background:#450a0a;color:#fecaca}.ni{width:72px;text-align:center;border:1px solid #334155;border-radius:6px;padding:5px 6px;font-size:13px;background:#0f172a;color:#f1f5f9}.ni-e{border-color:#22c55e}.ni-s{border-color:#ef4444}.btn{border:1px solid #334155;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;background:#1e293b;color:#e2e8f0;font-weight:600}.btn:hover{background:#334155}.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}.btn-primary:hover{background:#1d4ed8}.btn-sm{padding:5px 10px;font-size:12px}.btn-danger{color:#fecaca;border-color:#7f1d1d}.btn-danger:hover{background:#450a0a}.btn-full{width:100%;padding:11px}.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}.sec-hdr h3{font-size:15px;font-weight:700}.adj-panel,.info-box{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:12px}.info-box{background:#1e3a5f;border-color:#2563eb;color:#bfdbfe}.adj-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}.adj-row span{flex:1;font-size:12px;color:#cbd5e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ns-pos{font-weight:700;color:#60a5fa}.ns-neg{font-weight:700;color:#f87171}.loading{text-align:center;padding:38px;color:#94a3b8;font-size:13px}.spinner{width:28px;height:28px;border:3px solid #334155;border-top-color:#60a5fa;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}@keyframes spin{to{transform:rotate(360deg)}}.print-title{display:none}.muted{color:#94a3b8;font-size:12px}.admin-only{display:none}.admin .admin-only{display:inline-flex}@media print{.no-print{display:none!important}.proj-header,.tabs-wrap,.header-actions,.back-btn,.btn-row,.feedback{display:none!important}body{background:#fff!important;color:#000!important;font-size:12px}.content{max-width:100%;padding:0}.card{border:1px solid #ccc;border-radius:0;box-shadow:none;background:#fff!important}table{font-size:11px;color:#000!important}th{background:#f0f0f0!important;color:#000!important;print-color-adjust:exact}td{color:#000!important;border-color:#ddd!important}.print-title{display:block!important;font-size:17px;font-weight:800;margin:0 0 12px;color:#000!important}.pname,.psub{color:#000!important}}@media(max-width:560px){.form-grid{grid-template-columns:1fr}.header-actions{gap:5px}.header-actions .btn{font-size:11px;padding:5px 8px}.proj-grid{grid-template-columns:repeat(2,1fr)}.pname{max-width:145px}.ni{width:56px}.tabs-wrap{top:48px}}
</style>

<body>
<div id="s-login" class="screen active"><div class="home-wrap"><p class="home-title">Control de Inventarios</p><p class="home-sub">SBM Corp — Acceso por proyecto</p><div class="login-card"><div class="field"><label>Código de acceso</label><input id="access-code" class="input-full" type="password" placeholder="Ejemplo: ADMIN2026" onkeydown="if(event.key==='Enter') login()"></div><div class="btn-row"><button class="btn btn-primary btn-full" onclick="login()">Ingresar</button></div><p class="muted" style="margin-top:10px">Cada encargada verá únicamente el proyecto autorizado. Admin ve todos los proyectos.</p></div></div></div>
<div id="s-home" class="screen"><div class="home-wrap"><p class="home-title">Control de Inventarios</p><p class="home-sub" id="home-sub">Seleccioná el proyecto</p><div id="loading-home" class="loading"><div class="spinner"></div>Cargando proyectos...</div><div class="proj-grid" id="proj-grid" style="display:none"></div></div></div>
<div id="s-proj" class="screen"><div class="proj-header no-print"><button class="back-btn" id="back-btn" title="Volver">&#8592;</button><div class="proj-dot" id="hdr-dot" style="width:10px;height:10px;border-radius:50%"></div><span id="hdr-title" style="font-weight:700;font-size:15px"></span><span id="hdr-month" class="header-month"></span><div class="header-actions no-print"><button class="btn btn-sm" onclick="exportExcel()" title="Exportar Excel">📊 Excel</button><button class="btn btn-sm" onclick="printView()" title="PDF / Imprimir">🖨️ PDF</button></div></div>
<div class="tabs-wrap no-print"><div class="tabs" id="tabs"><button class="tab-btn active" data-t="mov">Movimientos</button><button class="tab-btn" data-t="inv">Inventario</button><button class="tab-btn" data-t="ped" id="ped-tab">Pedido</button><button class="tab-btn" data-t="count">Conteo físico</button><button class="tab-btn admin-tab" data-t="his">Historial</button><button class="tab-btn admin-tab" data-t="cfg">Config</button></div></div>
<div class="content"><div id="fbk" class="feedback"></div><div id="t-mov" class="tab-pane"></div><div id="t-inv" class="tab-pane" style="display:none"></div><div id="t-ped" class="tab-pane" style="display:none"></div><div id="t-count" class="tab-pane" style="display:none"></div><div id="t-his" class="tab-pane" style="display:none"></div><div id="t-cfg" class="tab-pane" style="display:none"></div></div></div>
<script>
const SUPA_URL = 'https://exuhbfsasoboxmksomar.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4dWhiZnNhc29ib3hta3NvbWFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4Mjk4NjYsImV4cCI6MjA5NTQwNTg2Nn0.Ao8l3NUkHxiDwWmK-GMpsBHgoQalFemb4Lf08yIyz4I';
async function sb(path, opts={}){const {prefer,...fetchOpts}=opts;const res=await fetch(SUPA_URL+'/rest/v1/'+path,{...fetchOpts,headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':prefer||'return=representation'}});if(!res.ok){throw new Error(await res.text())}const txt=await res.text();return txt?JSON.parse(txt):null}
const sGet=(t,q='')=>sb(t+(q?'?'+q:''),{method:'GET'}); const sPost=(t,data,prefer)=>sb(t,{method:'POST',body:JSON.stringify(data),prefer:prefer||'return=representation'}); const sPatch=(t,q,data)=>sb(t+'?'+q,{method:'PATCH',body:JSON.stringify(data)}); const sDel=(t,q)=>sb(t+'?'+q,{method:'DELETE'});
const now=new Date(), TODAY=now.toISOString().split('T')[0], CY=now.getFullYear(), CM=now.getMonth(), CD=now.getDate();
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const ACCESS={
 'ADMIN2026':{role:'admin',name:'Admin',match:null},
 'LSEG2026':{role:'user',name:'LSEG',match:['lseg','sec']},
 'UBERCOE2026':{role:'user',name:'Uber COE',match:['uber coe','coe']},
 'UBERGO2026':{role:'user',name:'UberGo',match:['ubergo','uber go']},
 'UBERFEDERAL2026':{role:'user',name:'Uber Federal',match:['federal']},
 'BAMBU2026':{role:'user',name:'Uber Bambú',match:['bambu','bambú']},
 'CEDRAL2026':{role:'user',name:'Uber Cedral',match:['cedral']},
 'MCK2026':{role:'user',name:'McKinsey',match:['mck','mckinsey']},
 'BAYER2026':{role:'user',name:'Bayer',match:['bayer']},
 'TECH2026':{role:'user',name:'TECH/CET',match:['tech','cet']}
};
let session=null, projects=[], products={}, stock={}, AP=null, AT='mov', MI={}, MD=TODAY, MR='', SA=false, AI={}, SAP=false, NP={name:'',unit:'PQT',em:''}, COUNT={}, importRows=[];
function norm(v){return (v||'').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ')}
function roleProjects(){if(!session) return []; if(session.role==='admin') return projects; return projects.filter(p=>session.match.some(m=>norm(p.name).includes(norm(m))||norm(p.id).includes(norm(m))))}
function login(){const code=document.getElementById('access-code').value.trim().toUpperCase(); if(!ACCESS[code]){alert('Código incorrecto');return} session=ACCESS[code]; document.body.classList.toggle('admin',session.role==='admin'); document.querySelectorAll('.admin-tab').forEach(b=>b.style.display=session.role==='admin'?'inline-block':'none'); document.getElementById('s-login').classList.remove('active'); document.getElementById('s-home').classList.add('active'); document.getElementById('home-sub').textContent=session.role==='admin'?'Admin — todos los proyectos':'Acceso: '+session.name; init();}
async function init(){try{projects=await sGet('projects','order=name');document.getElementById('loading-home').style.display='none';document.getElementById('proj-grid').style.display='grid';renderHome()}catch(e){document.getElementById('loading-home').innerHTML='⚠️ Error al conectar con Supabase.'}}
function renderHome(){const list=roleProjects(); document.getElementById('proj-grid').innerHTML=list.map(p=>`<div class="proj-card" onclick="openProject('${p.id}')"><div class="proj-dot" style="background:${p.color||'#3b82f6'}"></div><div class="proj-name">${p.name}</div><div class="proj-count">Toca para abrir</div></div>`).join('') || '<div class="loading">No hay proyecto asignado a este código.</div>';}
async function openProject(pid){AP=pid;AT='mov';MI={};MD=TODAY;MR='';SA=false;AI={};SAP=false;COUNT={};importRows=[];const p=projects.find(x=>x.id===pid);document.getElementById('s-home').classList.remove('active');document.getElementById('s-proj').classList.add('active');document.getElementById('hdr-dot').style.background=p.color||'#3b82f6';document.getElementById('hdr-title').textContent=p.name;document.getElementById('hdr-month').textContent=MONTHS[CM]+' '+CY;document.getElementById('ped-tab').textContent='Pedido'+(CD>=18?' 🔔':'');document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.t==='mov'));hideFbk();showTabLoading('mov');try{const prods=await sGet('products','project_id=eq.'+encodeURIComponent(pid)+'&order=name');products[pid]=prods||[];const stk=await sGet('stock','project_id=eq.'+encodeURIComponent(pid));stock[pid]={};(stk||[]).forEach(s=>stock[pid][s.product_id]=parseFloat(s.qty)||0)}catch(e){showFbk('⚠️ Error cargando datos: '+e.message,'warn')}showTab('mov')}
document.getElementById('back-btn').onclick=()=>{document.getElementById('s-home').classList.add('active');document.getElementById('s-proj').classList.remove('active');AP=null;renderHome()};
document.getElementById('tabs').onclick=e=>{const b=e.target.closest('.tab-btn');if(!b)return;if(session.role!=='admin' && ['his','cfg'].includes(b.dataset.t)) return;document.querySelectorAll('.tab-btn').forEach(x=>x.classList.toggle('active',x.dataset.t===b.dataset.t));AT=b.dataset.t;showTab(AT)};
function showTab(t){document.querySelectorAll('.tab-pane').forEach(p=>p.style.display='none');document.getElementById('t-'+t).style.display='block';hideFbk();if(t==='mov')renderMov();else if(t==='inv')renderInv();else if(t==='ped')renderPed();else if(t==='count')renderCount();else if(t==='his')renderHis();else if(t==='cfg')renderCfg()}
function showTabLoading(t){document.getElementById('t-'+t).innerHTML='<div class="loading"><div class="spinner"></div>Cargando...</div>'}
function getStock(id){return stock[AP]?.[id]??0} function getProds(){return products[AP]||[]}
function renderMov(){const el=document.getElementById('t-mov'); if(!getProds().length){el.innerHTML='<div class="loading">No hay productos configurados.</div>';return} const rows=getProds().map(p=>{const cur=getStock(p.id);return `<tr><td><span class="pname" title="${p.name}">${p.name}</span><span class="psub">${p.unit||''}</span></td><td class="tc"><b>${cur}</b></td><td class="tc"><input class="ni ni-e" type="number" min="0" step="1" placeholder="0" oninput="setInput('${p.id}','e',this.value)"></td><td class="tc"><input class="ni ni-s" type="number" min="0" step="1" placeholder="0" oninput="setInput('${p.id}','s',this.value)"></td><td class="tc" id="ns-${p.id}"><span style="color:#94a3b8">—</span></td></tr>`}).join(''); el.innerHTML=`<div class="card card-pad"><div class="form-grid"><div class="field"><label>Fecha</label><input type="date" value="${MD}" onchange="MD=this.value"></div><div class="field"><label>Responsable</label><input type="text" placeholder="Nombre" value="${MR}" oninput="MR=this.value"></div></div></div><div class="card" style="overflow-x:auto"><table><thead><tr><th>Producto</th><th class="tc">Stock act.</th><th class="tc">Entrada</th><th class="tc">Salida</th><th class="tc">Nuevo saldo</th></tr></thead><tbody>${rows}</tbody></table></div><button class="btn btn-primary btn-full no-print" onclick="registerMovements()">✓ Registrar Movimientos</button>`}
function setInput(id,f,v){if(!MI[id])MI[id]={e:'',s:''};MI[id][f]=v;const cur=getStock(id), ev=parseFloat(MI[id].e)||0, sv=parseFloat(MI[id].s)||0, nw=cur+ev-sv;const el=document.getElementById('ns-'+id);if(el)el.innerHTML=(ev>0||sv>0)?`<span class="${nw<0?'ns-neg':'ns-pos'}">${nw}</span>`:'<span style="color:#94a3b8">—</span>'}
async function registerMovements(){if(!MD||!MR.trim()){showFbk('⚠️ Ingresá fecha y responsable','warn');return}const entries=[], ns={...(stock[AP]||{})};for(const p of getProds()){const inp=MI[p.id]||{}, e=parseFloat(inp.e)||0, s=parseFloat(inp.s)||0, ts=Date.now();if(e>0){entries.push({id:`${ts}-${p.id}-e`,project_id:AP,product_id:p.id,type:'entrada',qty:e,date:MD,responsable:MR.trim()});ns[p.id]=(ns[p.id]??0)+e}if(s>0){entries.push({id:`${ts}-${p.id}-s`,project_id:AP,product_id:p.id,type:'salida',qty:s,date:MD,responsable:MR.trim()});ns[p.id]=(ns[p.id]??0)-s}}if(!entries.length){showFbk('⚠️ No hay movimientos para registrar','warn');return}try{await sPost('movements',entries);await sPost('stock',Object.entries(ns).map(([product_id,qty])=>({project_id:AP,product_id,qty})),'resolution=merge-duplicates');stock[AP]=ns;MI={};renderMov();showFbk('✅ Movimientos registrados','ok')}catch(e){showFbk('⚠️ Error al guardar: '+e.message,'warn')}}
function renderInv(){const adj=SA?`<div class="adj-panel"><p style="font-weight:700;margin-bottom:10px">📦 Stock físico actual</p>${getProds().map(p=>`<div class="adj-row"><span>${p.name}</span><input class="ni" type="number" min="0" value="${AI[p.id]??getStock(p.id)}" oninput="AI['${p.id}']=this.value"></div>`).join('')}<div class="btn-row"><button class="btn btn-primary" onclick="saveAdj()">Guardar</button><button class="btn" onclick="SA=false;renderInv()">Cancelar</button></div></div>`:''; const rows=getProds().map(p=>{const s=getStock(p.id), exp=parseFloat(p.expected_monthly)||0, r=exp>0?s/exp:1, st=r<=.2?['Crítico','badge-crit']:r<=.5?['Bajo','badge-low']:['OK','badge-ok'];return `<tr><td><span class="pname">${p.name}</span><span class="psub">${p.unit||''}</span></td><td class="tc"><b>${s}</b></td><td class="tc">${exp}</td><td class="tc"><span class="badge ${st[1]}">${st[0]}</span></td></tr>`}).join('');document.getElementById('t-inv').innerHTML=`<div class="print-title" id="print-inv-title"></div><div class="sec-hdr no-print"><h3>Stock Actual</h3><button class="btn btn-sm" onclick="SA=true;AI={};renderInv()">✏️ Ajustar stock</button></div>${adj}<div class="card" style="overflow-x:auto"><table><thead><tr><th>Producto</th><th class="tc">Stock</th><th class="tc">Consumo/mes</th><th class="tc">Estado</th></tr></thead><tbody>${rows}</tbody></table></div>`}
async function saveAdj(){const ns={...(stock[AP]||{})}, updates=[];for(const [k,v] of Object.entries(AI)){const n=parseFloat(v);if(!isNaN(n)&&n>=0){ns[k]=n;updates.push({project_id:AP,product_id:k,qty:n})}}if(!updates.length)return;try{await sPost('stock',updates,'resolution=merge-duplicates');stock[AP]=ns;SA=false;AI={};renderInv();showFbk('✅ Stock guardado','ok')}catch(e){showFbk('⚠️ Error: '+e.message,'warn')}}
async function renderPed(){const el=document.getElementById('t-ped');showTabLoading('ped');try{const firstDay=`${CY}-${String(CM+1).padStart(2,'0')}-01`;const movs=await sGet('movements',`project_id=eq.${encodeURIComponent(AP)}&type=eq.salida&date=gte.${firstDay}&order=date`);const order=getProds().map(p=>{const sal=(movs||[]).filter(m=>m.product_id===p.id).reduce((a,m)=>a+parseFloat(m.qty||0),0);const proj=CD>=7?Math.ceil(sal*30/CD):(parseFloat(p.expected_monthly)||0);const tgt=Math.max(proj,parseFloat(p.expected_monthly)||0), cur=getStock(p.id);return {p,cur,sal,proj,sug:Math.max(0,Math.ceil(tgt*1.2)-cur)}});const need=order.filter(o=>o.sug>0), ok=order.filter(o=>o.sug===0);el.innerHTML=`<div class="print-title" id="print-ped-title"></div><div class="info-box"><b>📦 Pedido sugerido — ${MONTHS[(CM+1)%12]} ${CY}</b><br><span class="muted">Consumo de ${MONTHS[CM]} · Stock seguridad 20%</span></div>${!need.length?'<div class="loading">✅ Todos los productos tienen stock suficiente</div>':`<div class="card" style="overflow-x:auto"><table><thead><tr><th>Producto</th><th class="tc">Stock act.</th><th class="tc">Consumido mes</th><th class="tc">A pedir</th></tr></thead><tbody>${need.map(({p,cur,sal,sug})=>`<tr><td><span class="pname">${p.name}</span><span class="psub">${p.unit||''}</span></td><td class="tc">${cur}</td><td class="tc">${sal}</td><td class="tc"><b>${sug}</b></td></tr>`).join('')}</tbody></table></div>`}${ok.length?`<p class="muted">Productos con stock suficiente: ${ok.length}</p>`:''}`}catch(e){el.innerHTML='<div class="loading">⚠️ Error: '+e.message+'</div>'}}
function renderCount(){const rows=getProds().map(p=>`<tr><td><span class="pname">${p.name}</span><span class="psub">Actual: ${getStock(p.id)} ${p.unit||''}</span></td><td class="tc"><input class="ni" type="number" min="0" value="${COUNT[p.id]??''}" oninput="COUNT['${p.id}']=this.value"></td></tr>`).join('');document.getElementById('t-count').innerHTML=`<div class="sec-hdr"><h3>Conteo físico</h3><div class="btn-row" style="margin:0"><button class="btn btn-sm" onclick="clearCount()">Limpiar conteo</button><button class="btn btn-sm" onclick="exportCountExcel()">📊 Excel conteo</button><button class="btn btn-primary btn-sm" onclick="applyCountToStock()">Aplicar al stock</button></div></div><div class="info-box">Este módulo es manual por ahora: tomás fotos, se revisa el conteo y aquí se digitan las cantidades finales.</div><div class="card" style="overflow-x:auto"><table><thead><tr><th>Producto</th><th class="tc">Conteo físico</th></tr></thead><tbody>${rows}</tbody></table></div>`}
function clearCount(){COUNT={};renderCount()} async function applyCountToStock(){const updates=[];for(const [k,v] of Object.entries(COUNT)){const n=parseFloat(v);if(!isNaN(n)&&n>=0)updates.push({project_id:AP,product_id:k,qty:n})}if(!updates.length){showFbk('⚠️ No hay conteo para aplicar','warn');return}if(!confirm('Esto reemplazará el stock actual por el conteo físico digitado. ¿Continuar?'))return;try{await sPost('stock',updates,'resolution=merge-duplicates');updates.forEach(u=>stock[AP][u.product_id]=u.qty);showFbk('✅ Conteo aplicado al stock','ok');renderCount()}catch(e){showFbk('⚠️ Error: '+e.message,'warn')}}
function exportCountExcel(){const data=[['Producto','Unidad','Stock actual','Conteo físico']];getProds().forEach(p=>data.push([p.name,p.unit||'',getStock(p.id),COUNT[p.id]??'']));const wb=XLSX.utils.book_new(), ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=[{wch:50},{wch:12},{wch:14},{wch:14}];XLSX.utils.book_append_sheet(wb,ws,'Conteo físico');XLSX.writeFile(wb,`Conteo_${(projects.find(p=>p.id===AP)?.name||AP)}_${TODAY}.xlsx`)}
async function renderHis(){const el=document.getElementById('t-his');showTabLoading('his');try{const movs=await sGet('movements',`project_id=eq.${encodeURIComponent(AP)}&order=created_at.desc&limit=100`);const prods=getProds();if(!movs?.length){el.innerHTML='<div class="loading">No hay movimientos registrados</div>';return}el.innerHTML=`<h3 style="margin-bottom:12px">Últimos movimientos</h3><div class="card" style="overflow-x:auto"><table><thead><tr><th>Tipo</th><th>Producto</th><th>Fecha</th><th>Responsable</th></tr></thead><tbody>${movs.map(m=>{const p=prods.find(x=>x.id===m.product_id);return `<tr><td><span class="badge ${m.type==='entrada'?'badge-in':'badge-out'}">${m.type==='entrada'?'+':'-'}${m.qty}</span></td><td><span class="pname">${p?.name||m.product_id}</span></td><td>${m.date}</td><td>${m.responsable||''}</td></tr>`}).join('')}</tbody></table></div>`}catch(e){el.innerHTML='<div class="loading">⚠️ Error: '+e.message+'</div>'}}
function renderCfg(){const prods=getProds();const addForm=SAP?`<div class="adj-panel"><p style="font-weight:700;margin-bottom:10px">Nuevo Producto</p><div class="form-grid"><div class="field"><label>Producto</label><input value="${NP.name}" oninput="NP.name=this.value"></div><div class="field"><label>Unidad</label><input value="${NP.unit}" oninput="NP.unit=this.value"></div><div class="field"><label>Consumo mensual</label><input type="number" value="${NP.em}" oninput="NP.em=this.value"></div></div><div class="btn-row"><button class="btn btn-primary" onclick="addProduct()">Guardar</button><button class="btn" onclick="SAP=false;renderCfg()">Cancelar</button></div></div>`:'';document.getElementById('t-cfg').innerHTML=`<div class="sec-hdr"><h3>Config Admin</h3><button class="btn btn-primary btn-sm" onclick="SAP=true;NP={name:'',unit:'PQT',em:''};renderCfg()">+ Producto</button></div>${addForm}${renderImporter()}${renderProjectManager()}<div class="card" style="overflow-x:auto"><table><thead><tr><th>Producto</th><th class="tc">Unidad</th><th class="tc">Consumo/mes</th><th class="tc"></th></tr></thead><tbody>${prods.map(p=>`<tr><td><span class="pname">${p.name}</span></td><td class="tc">${p.unit||''}</td><td class="tc">${p.expected_monthly||0}</td><td class="tc"><button class="btn btn-sm btn-danger" onclick="deleteProduct('${p.id}')">🗑</button></td></tr>`).join('')}</tbody></table></div>`;}
function renderImporter(){return `<div class="adj-panel"><h3 style="margin-bottom:8px">📥 Importar productos</h3><p class="muted" style="margin-bottom:8px">Puedes subir Excel/CSV o pegar una lista. Columnas recomendadas: Producto, Unidad, Consumo mensual, Stock inicial.</p><div class="form-grid"><div class="field"><label>Subir Excel/CSV</label><input type="file" accept=".xlsx,.xls,.csv" onchange="handleImportFile(event)"></div><div class="field"><label>Pegar lista</label><textarea id="paste-products" placeholder="Producto | Unidad | Consumo mensual | Stock inicial"></textarea></div></div><div class="btn-row"><button class="btn" onclick="previewPastedProducts()">Vista previa</button><button class="btn btn-primary" onclick="importProducts()">Cargar productos</button></div><div id="import-preview" style="margin-top:10px"></div></div>`}
function parseProductRows(rows){return rows.map(r=>Array.isArray(r)?{name:r[0],unit:r[1]||'Unidad',expected_monthly:r[2]||0,stock_initial:r[3]||0}:r).filter(r=>r.name&&norm(r.name)!=='producto').map(r=>({name:String(r.name).trim(),unit:String(r.unit||'Unidad').trim(),expected_monthly:parseFloat(r.expected_monthly)||0,stock_initial:parseFloat(r.stock_initial)||0}))}
function previewRows(){document.getElementById('import-preview').innerHTML=importRows.length?`<p class="muted">Vista previa: ${importRows.length} productos detectados.</p><div class="card" style="max-height:220px;overflow:auto"><table><thead><tr><th>Producto</th><th>Unidad</th><th>Consumo</th><th>Stock inicial</th></tr></thead><tbody>${importRows.slice(0,50).map(r=>`<tr><td>${r.name}</td><td>${r.unit}</td><td>${r.expected_monthly}</td><td>${r.stock_initial}</td></tr>`).join('')}</tbody></table></div>`:'<p class="muted">No hay productos para importar.</p>'}
function handleImportFile(ev){const f=ev.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=e=>{const data=new Uint8Array(e.target.result), wb=XLSX.read(data,{type:'array'}), ws=wb.Sheets[wb.SheetNames[0]], arr=XLSX.utils.sheet_to_json(ws,{header:1});let start=0;if(arr[0]&&norm(arr[0][0]).includes('producto'))start=1;importRows=parseProductRows(arr.slice(start));previewRows()};reader.readAsArrayBuffer(f)}
function previewPastedProducts(){const txt=document.getElementById('paste-products').value||'';const rows=txt.split(/\n+/).map(line=>line.split(/\t|,|;|\|/).map(x=>x.trim())).filter(r=>r[0]);importRows=parseProductRows(rows);previewRows()}
async function importProducts(){if(!importRows.length){previewPastedProducts()} if(!importRows.length){showFbk('⚠️ No hay productos para importar','warn');return}const existing=new Set(getProds().map(p=>norm(p.name)));const missing=importRows.filter(r=>!existing.has(norm(r.name)));if(!missing.length){showFbk('✅ No hay productos nuevos; todos estaban cargados.','ok');return}const stamp=Date.now();const rows=missing.map((r,i)=>({id:AP+'-imp-'+stamp+'-'+i,project_id:AP,name:r.name,unit:r.unit,expected_monthly:r.expected_monthly}));try{await sPost('products',rows);const stockRows=rows.map((p,i)=>({project_id:AP,product_id:p.id,qty:missing[i].stock_initial||0}));await sPost('stock',stockRows,'resolution=merge-duplicates');products[AP]=getProds().concat(rows).sort((a,b)=>a.name.localeCompare(b.name));if(!stock[AP])stock[AP]={};stockRows.forEach(s=>stock[AP][s.product_id]=s.qty);showFbk('✅ Se importaron '+rows.length+' productos sin duplicar.','ok');importRows=[];renderCfg()}catch(e){showFbk('⚠️ Error importando: '+e.message,'warn')}}
function renderProjectManager(){return `<div class="adj-panel"><h3 style="margin-bottom:8px">🏢 Proyectos</h3><div class="form-grid"><div class="field"><label>Nuevo proyecto</label><input id="new-proj-name" placeholder="Ej. Abbott"></div><div class="field"><label>Color</label><input id="new-proj-color" type="color" value="#2563eb"></div></div><div class="btn-row"><button class="btn btn-primary" onclick="addProject()">+ Agregar proyecto</button></div><div class="card" style="margin-top:12px;overflow-x:auto"><table><thead><tr><th>Proyecto</th><th>ID</th><th class="tc">Acción</th></tr></thead><tbody>${projects.map(p=>`<tr><td>${p.name}</td><td class="muted">${p.id}</td><td class="tc"><button class="btn btn-sm btn-danger" onclick="deleteProject('${p.id}')">Eliminar</button></td></tr>`).join('')}</tbody></table></div></div>`}
async function addProject(){const name=document.getElementById('new-proj-name').value.trim(), color=document.getElementById('new-proj-color').value||'#2563eb';if(!name){showFbk('⚠️ Escribí el nombre del proyecto','warn');return}const id=norm(name).replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')+'-'+Date.now().toString().slice(-4);try{const row={id,name,color};const res=await sPost('projects',row);projects.push(res?.[0]||row);showFbk('✅ Proyecto agregado','ok');renderCfg()}catch(e){showFbk('⚠️ Error creando proyecto: '+e.message,'warn')}}
async function deleteProject(id){const p=projects.find(x=>x.id===id);if(!confirm(`Eliminar proyecto ${p?.name||id}? Esto también eliminará sus productos, stock y movimientos.`))return;try{await sDel('movements','project_id=eq.'+encodeURIComponent(id));await sDel('stock','project_id=eq.'+encodeURIComponent(id));await sDel('products','project_id=eq.'+encodeURIComponent(id));await sDel('projects','id=eq.'+encodeURIComponent(id));projects=projects.filter(x=>x.id!==id);if(AP===id){document.getElementById('back-btn').click()}else{renderCfg()}showFbk('✅ Proyecto eliminado','ok')}catch(e){showFbk('⚠️ Error eliminando: '+e.message,'warn')}}
async function addProduct(){if(!NP.name.trim()){showFbk('⚠️ Escribí el producto','warn');return}const prod={id:AP+'-'+Date.now(),project_id:AP,name:NP.name.trim(),unit:NP.unit||'PQT',expected_monthly:parseFloat(NP.em)||0};try{await sPost('products',prod);products[AP].push(prod);stock[AP][prod.id]=0;await sPost('stock',{project_id:AP,product_id:prod.id,qty:0},'resolution=merge-duplicates');SAP=false;NP={name:'',unit:'PQT',em:''};renderCfg();showFbk('✅ Producto agregado','ok')}catch(e){showFbk('⚠️ Error: '+e.message,'warn')}}
async function deleteProduct(id){if(!confirm('¿Eliminar este producto?'))return;try{await sDel('stock','product_id=eq.'+encodeURIComponent(id));await sDel('movements','product_id=eq.'+encodeURIComponent(id));await sDel('products','id=eq.'+encodeURIComponent(id));products[AP]=products[AP].filter(p=>p.id!==id);delete stock[AP][id];renderCfg()}catch(e){showFbk('⚠️ Error: '+e.message,'warn')}}
async function exportExcel(){const proj=projects.find(p=>p.id===AP), wb=XLSX.utils.book_new(), firstDay=`${CY}-${String(CM+1).padStart(2,'0')}-01`;const inv=[['Producto','Unidad','Stock Actual','Consumo Mensual Esperado','Estado']];getProds().forEach(p=>{const s=getStock(p.id), exp=parseFloat(p.expected_monthly)||0, r=exp>0?s/exp:1, st=r<=.2?'Crítico':r<=.5?'Bajo':'OK';inv.push([p.name,p.unit||'',s,exp,st])});let ws=XLSX.utils.aoa_to_sheet(inv);ws['!cols']=[{wch:50},{wch:12},{wch:14},{wch:24},{wch:12}];XLSX.utils.book_append_sheet(wb,ws,'Stock Actual');try{const movs=await sGet('movements',`project_id=eq.${encodeURIComponent(AP)}&date=gte.${firstDay}&order=date,created_at`), mov=[['Fecha','Tipo','Producto','Unidad','Cantidad','Responsable']];(movs||[]).forEach(m=>{const p=getProds().find(x=>x.id===m.product_id);mov.push([m.date,m.type,p?.name||m.product_id,p?.unit||'',parseFloat(m.qty),m.responsable||''])});ws=XLSX.utils.aoa_to_sheet(mov);ws['!cols']=[{wch:12},{wch:10},{wch:50},{wch:10},{wch:10},{wch:20}];XLSX.utils.book_append_sheet(wb,ws,'Movimientos')}catch(e){}XLSX.writeFile(wb,`Inventario_${proj?.name||AP}_${MONTHS[CM]}_${CY}.xlsx`)}
function printView(){const proj=projects.find(p=>p.id===AP);const title=`${proj?.name||AP} — ${AT==='ped'?'Pedido Sugerido':'Inventario'} — ${MONTHS[CM]} ${CY}`;if(AT!=='inv'&&AT!=='ped'){goTab('inv');setTimeout(()=>{const el=document.getElementById('print-inv-title');if(el)el.textContent=title;window.print()},300)}else{const el=document.getElementById(AT==='ped'?'print-ped-title':'print-inv-title');if(el)el.textContent=title;window.print()}}
function goTab(t){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===t));AT=t;showTab(t)} function showFbk(msg,type){const el=document.getElementById('fbk');el.textContent=msg;el.className='feedback '+type;el.style.display='block';setTimeout(()=>el.style.display='none',4500)} function hideFbk(){const el=document.getElementById('fbk');if(el)el.style.display='none'}
</script>
</body>
</html>
